name: Build and Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
            context: .
            push: true
            platforms: linux/amd64 
            tags: iliandocker/planmate-docker-repo:planmate-frontend

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.GCP_VM_IP }}
            username: ${{ secrets.GCP_SSH_USERNAME }}
            key: ${{ secrets.GCP_SSH_KEY }}
            script: |
              cd ~/planmate
              sudo docker-compose pull frontend
              sudo docker-compose up -d --remove-orphans frontend
              sudo docker image prune -f

      - name: Verify Health Check
        run: |
          echo "Waiting for React Frontend to respond..."
          for i in {1..15}; do
            # Checking the root domain to see if the web app is up
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://planmate.org || echo "000")
            if [ "$HTTP_STATUS" == "200" ]; then
              echo "Health check passed! Frontend is live."
              exit 0
            fi
            echo "App not ready yet (Status: $HTTP_STATUS). Retrying... ($i/15)"
            sleep 10
          done
          echo "Health check failed."
          exit 1