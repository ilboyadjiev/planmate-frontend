
server {
    listen 80;
    server_name planmate.org www.planmate.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name planmate.org www.planmate.org;

    ssl_certificate /etc/letsencrypt/live/planmate.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/planmate.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Serve React Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Spring Boot
    location /api/ {
        proxy_pass http://planmate-backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}