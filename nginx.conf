server {
    listen 80;
    server_name planmate.org www.planmate.org;

    # 1. SERVE REACT AND FIX THE 404 ROUTER ISSUE
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # THIS is the magic line that replaces all your 301 redirects!
        # It says: "If the file doesn't exist, just load index.html and let React figure out the page."
        try_files $uri $uri/ /index.html;
    }

    # 2. PROXY API REQUESTS TO SPRING BOOT
    location /api/ {
        # Note the trailing slashes here, they are important to prevent /api/api/ routing errors
        proxy_pass http://backend:8080/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}